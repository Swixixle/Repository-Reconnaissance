services:
  - type: web
    name: debrief
    env: node
    autoDeploy: yes
    buildCommand: npm ci && pip install -e . && npm run build
    startCommand: node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PYTHON_EXEC_PATH
        value: python3
      - key: DATABASE_URL
        fromDatabase:
          name: debrief-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: debrief-redis
          property: connectionString
      - key: API_KEY
        sync: false
      - key: ADMIN_KEY
        sync: false

  - type: worker
    name: debrief-worker
    env: node
    autoDeploy: yes
    buildCommand: npm ci && pip install -e . && npm run build
    startCommand: node dist/server/queue/analyzer-worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PYTHON_EXEC_PATH
        value: python3
      - key: DEBRIEF_RUN_ANALYZER_WORKER
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: debrief-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: debrief-redis
          property: connectionString

databases:
  - name: debrief-db
    databaseName: debrief
    user: debrief

redis:
  - name: debrief-redis
    plan: free
